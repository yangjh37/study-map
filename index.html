<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계와 시민: 스터디맵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    
    <header class="bg-white shadow-sm py-8 px-4 mb-8 text-center">
        <h1 class="text-2xl font-bold text-blue-900 mb-2">경희대 국제캠퍼스 스터디맵 🗺️</h1>
        <p class="text-gray-500">건물을 선택하여 도면과 공간 정보를 확인하세요.</p>
    </header>

    <main class="max-w-5xl mx-auto px-4 mb-12">
        <div id="loading" class="text-center py-10 text-gray-500 font-bold">데이터를 불러오는 중입니다... ⏳</div>
        <div id="building-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 hidden"></div>
    </main>

    <script>
        // 🚨 여기에 아까 복사한 구글 시트 웹게시(CSV) 링크를 붙여넣으세요!
        const SHEET_CSV_URL = "여기에_링크를_붙여넣으세요";

        Papa.parse(SHEET_CSV_URL, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                renderBuildings(data);
            }
        });

        function renderBuildings(sheetData) {
            document.getElementById('loading').style.display = 'none';
            const container = document.getElementById('building-list');
            container.classList.remove('hidden');

            // 데이터를 건물별로 묶어줍니다 (중복 제거 및 공간 수 카운트)
            const buildingsMap = {};
            sheetData.forEach(row => {
                if(!row.building_id) return; // 빈 줄 무시
                
                if (!buildingsMap[row.building_id]) {
                    buildingsMap[row.building_id] = {
                        id: row.building_id,
                        name: row.building_name,
                        icon: row.building_icon,
                        count: 0
                    };
                }
                // floor_name이 있으면 공간 갯수 +1
                if(row.floor_name) {
                    buildingsMap[row.building_id].count += 1;
                }
            });

            const buildings = Object.values(buildingsMap);
            
            const cardsHTML = buildings.map(building => {
                const statusText = building.count > 0 ? `${building.count}개 공간 확인됨` : "공간 데이터 수집 중 🔍";
                const textColor = building.count > 0 ? "text-blue-600 font-medium" : "text-gray-400";

                return `
                    <a href="detail.html?id=${building.id}" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md hover:border-blue-400 transition-all text-left flex items-center gap-4 cursor-pointer w-full">
                        <div class="bg-yellow-100 p-3 rounded-lg text-2xl">${building.icon}</div>
                        <div>
                            <h2 class="text-lg font-bold text-gray-800">${building.name}</h2>
                            <p class="text-sm ${textColor} mt-1">${statusText}</p>
                        </div>
                    </a>
                `;
            }).join('');

            container.innerHTML = cardsHTML;
        }
    </script>
</body>
</html>
