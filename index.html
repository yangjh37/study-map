<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계와 시민: 스터디맵</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    
    <header class="bg-white shadow-sm py-8 px-4 mb-8 text-center">
        <h1 class="text-2xl font-bold text-blue-900 mb-2">경희대 국제캠퍼스 스터디맵 🗺️</h1>
        <p class="text-gray-500">건물을 선택하여 도면과 공간 정보를 확인하세요.</p>
    </header>

    <main class="max-w-5xl mx-auto px-4 mb-12">
        <div id="building-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
            </div>
    </main>

    <script>
        // 1. 제공해주신 건물 리스트를 반영한 데이터 배열
        const buildingData = [
            { id: "electronics", name: "전자정보대학관", icon: "💻", spaceCount: 0 },
            { id: "applied_science", name: "응용과학대학관", icon: "🔬", spaceCount: 0 },
            { id: "intl_studies", name: "국제학관", icon: "🌍", spaceCount: 0 },
            // 중앙도서관은 url 속성을 추가하여 외부 링크로 연결되게 설정합니다
            { id: "library", name: "중앙도서관", icon: "🏛️", url: "https://lib.khu.ac.kr/" }, 
            { id: "intl_business", name: "국제경영대학관", icon: "💼", spaceCount: 0 },
            { id: "life_science", name: "생명과학대학관", icon: "🌱", spaceCount: 0 },
            { id: "seonseung", name: "선승관", icon: "🥋", spaceCount: 0 },
            { id: "multimedia", name: "멀티미디어교육관", icon: "🎬", spaceCount: 0 },
            { id: "physical_edu", name: "체육대학관", icon: "⚽", spaceCount: 0 },
            { id: "engineering", name: "공과대학관", icon: "⚙️", spaceCount: 0 },
            { id: "foreign_lang", name: "외국어대학", icon: "🗣️", spaceCount: 0 },
            { id: "woojungwon", name: "우정원", icon: "🏢", spaceCount: 0 }
        ];

        // 2. 화면에 카드를 그리는 함수
        function renderBuildings() {
            const container = document.getElementById('building-list');
            
            const cardsHTML = buildingData.map(building => {
                // 중앙도서관처럼 url 데이터가 있는 경우: 새 창으로 외부 링크 열기
                if (building.url) {
                    return `
                        <a href="${building.url}" target="_blank" rel="noopener noreferrer" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md hover:border-blue-400 transition-all text-left flex items-center gap-4 w-full">
                            <div class="bg-yellow-100 p-3 rounded-lg text-2xl">${building.icon}</div>
                            <div>
                                <h2 class="text-lg font-bold text-gray-800">${building.name}</h2>
                                <p class="text-sm text-blue-500 mt-1 font-semibold">도서관 홈페이지 이동 ↗</p>
                            </div>
                        </a>
                    `;
                } 
                // 일반 건물의 경우: detail.html로 이동하며 건물의 id 값을 주소창에 전달
                else {
                    return `
                        <a href="detail.html?id=${building.id}" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md hover:border-blue-400 transition-all text-left flex items-center gap-4 cursor-pointer w-full">
                            <div class="bg-yellow-100 p-3 rounded-lg text-2xl">${building.icon}</div>
                            <div>
                                <h2 class="text-lg font-bold text-gray-800">${building.name}</h2>
                                <p class="text-sm text-blue-600 mt-1">공간 정보 보기</p>
                            </div>
                        </a>
                    `;
                }
            }).join('');

            container.innerHTML = cardsHTML;
        }

        renderBuildings();
    </script>
</body>
</html>
