<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계와 시민: 스터디맵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    
    <header class="bg-white shadow-sm py-8 px-4 mb-6 text-center">
        <h1 class="text-2xl font-bold text-blue-900 mb-2">경희대 국제캠퍼스 스터디맵 🗺️</h1>
        <p class="text-gray-500">목적에 맞는 공간을 찾거나 건물을 선택하세요.</p>
    </header>

    <main class="max-w-5xl mx-auto px-4 mb-12">
        
        <div class="flex flex-wrap gap-2 justify-center mb-8" id="filter-buttons">
            <button onclick="applyFilter('all')" class="filter-btn active px-4 py-2 rounded-full border border-blue-400 bg-blue-50 text-blue-700 font-bold shadow-sm transition-colors">전체 보기</button>
            <button onclick="applyFilter('콘센트')" class="filter-btn px-4 py-2 rounded-full border border-gray-200 bg-white text-gray-600 font-medium hover:bg-gray-50 transition-colors">🔌 콘센트 확보</button>
            <button onclick="applyFilter('팀플')" class="filter-btn px-4 py-2 rounded-full border border-gray-200 bg-white text-gray-600 font-medium hover:bg-gray-50 transition-colors">🗣️ 팀플/대화</button>
            <button onclick="applyFilter('조용')" class="filter-btn px-4 py-2 rounded-full border border-gray-200 bg-white text-gray-600 font-medium hover:bg-gray-50 transition-colors">🤫 조용한 집중</button>
        </div>

        <div id="loading" class="text-center py-10 text-gray-500 font-bold">데이터를 불러오는 중입니다... ⏳</div>
        
        <div id="building-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 hidden"></div>
        
        <div id="no-result" class="text-center py-10 text-gray-500 font-bold hidden">조건에 맞는 공간이 없습니다. 🥲</div>

    </main>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQO10FKa8KgbqDTwSuJgPxWqIkdwj2WtqOIiBrtrSVeYX3KL9lFSXcDHiUL53-ejc0sDHkosmtegi8E/pub?output=csv";
        let allSheetData = []; 

        Papa.parse(SHEET_CSV_URL, {
            download: true,
            header: true,
            complete: function(results) {
                allSheetData = results.data;
                document.getElementById('loading').style.display = 'none';
                applyFilter('all'); 
            }
        });

        function applyFilter(keyword) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                if(btn.innerText.includes(keyword) || (keyword === 'all' && btn.innerText.includes('전체'))) {
                    btn.className = "filter-btn px-4 py-2 rounded-full border border-blue-400 bg-blue-50 text-blue-700 font-bold shadow-sm transition-colors active";
                } else {
                    btn.className = "filter-btn px-4 py-2 rounded-full border border-gray-200 bg-white text-gray-600 font-medium hover:bg-gray-50 transition-colors";
                }
            });

            const buildingsMap = {};

            allSheetData.forEach(row => {
                if(!row.building_id || row.building_id.trim() === '') return;

                let isMatch = false;
                
                if (keyword === 'all') {
                    isMatch = true;
                } else if (keyword === '콘센트' && row.plug && row.plug.includes('있음')) {
                    isMatch = true;
                } else if (keyword === '팀플' && row.features && (row.features.includes('팀플') || row.features.includes('대화') || row.features.includes('소음'))) {
                    isMatch = true;
                } else if (keyword === '조용' && row.features && (row.features.includes('조용') || row.features.includes('집중') || row.features.includes('정숙'))) {
                    isMatch = true;
                }

                if (row.building_url || !row.floor_name || row.floor_name.trim() === '') {
                     if(keyword !== 'all') isMatch = false;
                }

                if (!buildingsMap[row.building_id]) {
                    buildingsMap[row.building_id] = {
                        id: row.building_id.trim(),
                        name: row.building_name ? row.building_name.trim() : '',
                        icon: row.building_icon ? row.building_icon.trim() : '',
                        url: row.building_url ? row.building_url.trim() : '',
                        count: 0,
                        hasMatchingFloor: false
                    };
                } else {
                    if (!buildingsMap[row.building_id].name && row.building_name) {
                        buildingsMap[row.building_id].name = row.building_name.trim();
                    }
                    if (!buildingsMap[row.building_id].icon && row.building_icon) {
                        buildingsMap[row.building_id].icon = row.building_icon.trim();
                    }
                    if (!buildingsMap[row.building_id].url && row.building_url) {
                        buildingsMap[row.building_id].url = row.building_url.trim();
                    }
                }

                if (row.floor_name && row.floor_name.trim() !== '') buildingsMap[row.building_id].count += 1;
                if (isMatch) buildingsMap[row.building_id].hasMatchingFloor = true;
            });

            const filteredBuildings = Object.values(buildingsMap).filter(b => b.hasMatchingFloor);
            renderBuildings(filteredBuildings);
        }

        function renderBuildings(buildings) {
            const container = document.getElementById('building-list');
            const noResult = document.getElementById('no-result');

            if (buildings.length === 0) {
                container.classList.add('hidden');
                noResult.classList.remove('hidden');
                return;
            }

            container.classList.remove('hidden');
            noResult.classList.add('hidden');

            const cardsHTML = buildings.map(building => {
                const bName = building.name || building.id;
                const bIcon = building.icon || '🏢';

                if (building.url) {
                    return `
                        <a href="${building.url}" target="_blank" rel="noopener noreferrer" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md hover:border-blue-400 transition-all text-left flex items-center gap-4 w-full">
                            <div class="bg-yellow-100 p-3 rounded-lg text-2xl">${bIcon}</div>
                            <div>
                                <h2 class="text-lg font-bold text-gray-800">${bName}</h2>
                                <p class="text-sm text-blue-500 mt-1 font-semibold">홈페이지 이동 ↗</p>
                            </div>
                        </a>
                    `;
                } else {
                    const statusText = building.count > 0 ? `${building.count}개 공간 확인됨` : "공간 데이터 수집 중 🔍";
                    const textColor = building.count > 0 ? "text-blue-600 font-medium" : "text-gray-400";

                    return `
                        <a href="detail.html?id=${building.id}" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md hover:border-blue-400 transition-all text-left flex items-center gap-4 cursor-pointer w-full">
                            <div class="bg-yellow-100 p-3 rounded-lg text-2xl">${bIcon}</div>
                            <div>
                                <h2 class="text-lg font-bold text-gray-800">${bName}</h2>
                                <p class="text-sm ${textColor} mt-1">${statusText}</p>
                            </div>
                        </a>
                    `;
                }
            }).join('');

            container.innerHTML = cardsHTML;
        }
    </script>
</body>
</html>
